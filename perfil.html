    <style>
        /* Estilos adicionais específicos do perfil */
        .config-oculto {
            filter: blur(5px);
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
            padding: 2px 6px;
            display: inline-block;
        }
        .pro-badge-pequeno {
            background: linear-gradient(135deg, #f59e0b, #eab308);

<body>
    <div class="header">
        <div class="header-content">
            <div class="header-logo"><img src="img/brasao.png" onerror="this.style.display='none'" alt="Logo"></div>
            <div class="header-text">
                <h1>🧠 Loterias V.6.1 <span class="version-badge">MEU PERFIL</span></h1>
                <p class="header-subtitle">10 loterias • IA que Aprende Padrões • Login Social • Sistema de Créditos • PIX</p>
            </div>
            <div class="header-logo"><img src="img/brasao.png" onerror="this.style.display='none'" alt="Logo"></div>
        </div>
    </div>

    <div class="container">
        <button class="btn-voltar" onclick="window.location.href='index.html'">← Voltar ao Sistema</button>
        <div id="perfilContent"><div class="loading">🔍 Carregando seus dados...</div></div>
    </div>

    <script>
        let usuario = null;
        let creditos = 0;
        let isPro = false;
        let jogosSelecionados = new Set();
        let exportandoPDF = false;
        
        // Variável global para o jsPDF
        let jspdfLib = null;
        
        function formatarNumeroZero(numero) {
            return numero.toString().padStart(2, '0');
        }
        
        function getNomeMes(numero) {
            const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 
                           'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
            return meses[numero - 1] || 'Desconhecido';
        }
        
        // Função para mascarar configurações (para não PRO)
        function mascararConfiguracoes(texto) {
            if (!texto) return '••••••';
            // Mantém o comprimento aproximado mas com asteriscos
            const comprimento = texto.length;
            return '•'.repeat(Math.min(comprimento, 40));
        }
        
        function toggleSelecao(itemIdx, jogoIdx) {
            const id = `${itemIdx}_${jogoIdx}`;
            if (jogosSelecionados.has(id)) {
                jogosSelecionados.delete(id);
            } else {
                jogosSelecionados.add(id);
            }
            atualizarContadorSelecionados();
        }
        
        function selecionarTodos() {
            const checkboxes = document.querySelectorAll('.selecionar-jogo');
            checkboxes.forEach(cb => cb.checked = true);
            atualizarContadorSelecionados();
            mostrarToast(`${checkboxes.length} palpites selecionados!`, 'success');
        }
        
        function atualizarContadorSelecionados() {
            const contador = document.getElementById('contadorSelecionados');
            if (contador) contador.textContent = `${jogosSelecionados.size} selecionado(s)`;
        }
        
        // ============================================
        // FUNÇÃO PARA VERIFICAR SE PODE EXPORTAR PDF (APENAS PRO)
        // ============================================
        async function podeExportarPDF() {
            if (!isPro) {
                mostrarToast('⭐ Esta funcionalidade é exclusiva para usuários PRO!', 'warning');
                mostrarToast('Ative o plano PRO por apenas R$ 19,90 e tenha acesso a esta e outras vantagens.', 'info');
                return false;
            }
            return true;
        }
        
        // ============================================
        // FUNÇÃO PDF (SÓ PARA PRO)
        // ============================================
        async function exportarSelecionadosPDF() {
            // VERIFICAÇÃO PRO - BLOQUEIA SE NÃO FOR PRO
            if (!await podeExportarPDF()) {
                return;
            }
            
            if (exportandoPDF) return;
            
            exportandoPDF = true;
            
            try {
                const checkboxes = document.querySelectorAll('.selecionar-jogo:checked');
                
                if (checkboxes.length === 0) {
                    alert('Nenhum palpite selecionado!');
                    exportandoPDF = false;
                    return;
                }
                
                // Coletar dados dos palpites
                const palpites = [];
                checkboxes.forEach((checkbox) => {
                    const item = checkbox.closest('.historico-item');
                    if (item) {
                        const loteriaElem = item.querySelector('.historico-loteria');
                        const numerosElem = item.querySelector('.historico-jogos');
                        const dataElem = item.querySelector('.historico-data');
                        const configElem = item.querySelector('.config-texto');
                        
                        let numerosTexto = numerosElem ? numerosElem.innerText : '';
                        numerosTexto = numerosTexto.replace(/[📊🎲💰📜✨📅]/g, '').replace('Números:', '').replace('Numeros:', '').trim();
                        
                        let loteriaTexto = loteriaElem ? loteriaElem.innerText : 'Loteria';
                        loteriaTexto = loteriaTexto.replace(/[🎲]/g, '').trim();
                        
                        let dataTexto = dataElem ? dataElem.innerText : '';
                        dataTexto = dataTexto.replace(/[📅]/g, '').trim();
                        
                        let configTexto = configElem ? configElem.innerText : '';
                        
                        palpites.push({
                            loteria: loteriaTexto,
                            numeros: numerosTexto,
                            data: dataTexto,
                            config: configTexto
                        });
                    }
                });
                
                // Criar elemento HTML para o PDF
                const divPDF = document.createElement('div');
                divPDF.style.width = '750px';
                divPDF.style.padding = '25px';
                divPDF.style.backgroundColor = 'white';
                divPDF.style.fontFamily = 'Arial, sans-serif';
                divPDF.style.position = 'absolute';
                divPDF.style.left = '-9999px';
                divPDF.style.top = '-9999px';
                
                const dataAtual = new Date();
                const dataFormatada = dataAtual.toLocaleDateString('pt-BR') + ' às ' + dataAtual.toLocaleTimeString('pt-BR');
                
                // Brasão
                const brasaoUrl = 'img/brasao.png';
                
                // Gerar HTML dos palpites
                let palpitesHTML = '';
                palpites.forEach((p, idx) => {
                    const numerosArray = p.numeros.split(',').map(n => n.trim());
                    palpitesHTML += `
                        <div style="margin-bottom: 15px; padding: 12px; border-left: 4px solid #8b5cf6; background: #f8fafc; border-radius: 8px; page-break-inside: avoid;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <span style="font-weight: bold; font-size: 13px;">${idx+1}. ${p.loteria}</span>
                                <span style="font-size: 9px; color: #666;">${p.data || 'Data não informada'}</span>
                            </div>
                            <div style="font-family: Arial; font-size: 12px; color: #3b82f6; margin-top: 5px;">
                                Números: ${numerosArray.map(n => `<strong>${n}</strong>`).join(' • ')}
                            </div>
                            ${p.config ? `<div style="font-size: 9px; color: #888; margin-top: 8px; border-top: 1px solid #eee; padding-top: 5px;">⚙️ ${p.config}</div>` : ''}
                        </div>
                    `;
                });
                
                divPDF.innerHTML = `
                    <div style="position: relative;">
                        <!-- CABEÇALHO COM BRASÃO -->
                        <div style="text-align: center; border-bottom: 3px solid #8b5cf6; padding-bottom: 15px; margin-bottom: 20px;">
                            <div style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 8px;">
                                <img src="${brasaoUrl}" style="width: 50px; height: 50px; object-fit: contain;" onerror="this.style.display='none'">
                                <h1 style="font-size: 24px; color: #8b5cf6; margin: 0;">LOTERIAS IA</h1>
                                <img src="${brasaoUrl}" style="width: 50px; height: 50px; object-fit: contain;" onerror="this.style.display='none'">
                            </div>
                            <p style="font-size: 11px; color: #666;">Sistema Profissional de Loterias com IA Real</p>
                            <p style="font-size: 10px; color: #999;">Versão 6.1</p>
                        </div>
                        
                        <!-- INFORMAÇÕES DO USUÁRIO -->
                        <div style="background: #f1f5f9; padding: 12px; border-radius: 8px; margin-bottom: 20px;">
                            <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
                                <span><strong>Usuário:</strong> ${usuario.nome || 'Não informado'}</span>
                                <span><strong>Email:</strong> ${usuario.email || 'Não informado'}</span>
                                <span><strong>Data:</strong> ${dataFormatada}</span>
                                <span><strong>Total:</strong> ${palpites.length} palpites</span>
                            </div>
                        </div>
                        
                        <!-- TÍTULO -->
                        <h3 style="color: #8b5cf6; font-size: 14px; margin-bottom: 12px;">📜 PALPITES SELECIONADOS</h3>
                        
                        <!-- PALPITES -->
                        ${palpitesHTML}
                        
                        <!-- RODAPÉ -->
                        <div style="text-align: center; margin-top: 25px; padding-top: 10px; border-top: 1px solid #ccc; font-size: 8px; color: #999;">
                            Documento gerado por Loterias IA - ${dataFormatada}
                        </div>
                    </div>
                `;
                
                document.body.appendChild(divPDF);
                await new Promise(r => setTimeout(r, 100));
                
                const { jsPDF } = window.jspdf;
                const canvas = await html2canvas(divPDF, {
                    scale: 2.5,
                    backgroundColor: '#ffffff',
                    logging: false,
                    useCORS: true
                });
                
                document.body.removeChild(divPDF);
                
                const imgData = canvas.toDataURL('image/png');
                const imgWidth = 210;
                const pageHeight = 297;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                
                const doc = new jsPDF({
                    unit: 'mm',
                    format: 'a4',
                    orientation: 'portrait'
                });
                
                doc.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
                
                let heightLeft = imgHeight;
                let position = 0;
                while (heightLeft > pageHeight) {
                    position = heightLeft - pageHeight;
                    doc.addPage();
                    doc.addImage(imgData, 'PNG', 0, -position, imgWidth, imgHeight);
                    heightLeft -= pageHeight;
                }
                
                doc.save(`palpites_loterias_ia_${Date.now()}.pdf`);
                mostrarToast(`${palpites.length} palpites exportados com sucesso!`, 'success');
                
            } catch (error) {
                console.error('Erro detalhado:', error);
                alert('Erro ao gerar PDF: ' + error.message);
            } finally {
                exportandoPDF = false;
            }
        }
        
        function mostrarToast(mensagem, tipo = 'success') {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.right = '20px';
            toast.style.background = tipo === 'success' ? '#22c55e' : tipo === 'warning' ? '#f59e0b' : '#ef4444';
            toast.style.color = 'white';
            toast.style.padding = '10px 20px';
            toast.style.borderRadius = '8px';
            toast.style.zIndex = '9999';
            toast.style.fontSize = '13px';
            toast.innerHTML = mensagem;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
        
        function aguardarSupabase() {
            return new Promise((resolve) => {
                if (window.supabaseClient) { resolve(); return; }
                const checkInterval = setInterval(() => {
                    if (window.supabaseClient) { clearInterval(checkInterval); resolve(); }
                }, 100);
                setTimeout(() => { clearInterval(checkInterval); resolve(); }, 5000);
            });
        }
        
        // ============================================
        // FUNÇÃO PARA CARREGAR STATUS PRO DO SUPABASE
        // ============================================
        async function carregarStatusPro(uid) {
            try {
                const { data, error } = await window.supabaseClient
                    .rpc('get_pro_status', { user_uid: uid });
                
                if (error) throw error;
                if (data && data.length > 0) {
                    return { isPro: data[0].is_pro, expiresAt: data[0].expira_em, diasRestantes: data[0].dias_restantes };
                }
                return { isPro: false, expiresAt: null, diasRestantes: 0 };
            } catch (error) {
                console.error('Erro ao carregar status PRO:', error);
                return { isPro: false, expiresAt: null, diasRestantes: 0 };
            }
        }
        
        // ============================================
        // FUNÇÃO PARA LIMPAR DADOS ANTIGOS DO USUÁRIO
        // ============================================
        async function limparDadosAntigosUsuario(uid) {
            try {
                const { data, error } = await window.supabaseClient
                    .rpc('limpar_historico_usuario', { user_uid: uid });
                if (error) throw error;
                console.log(`🗑️ Limpeza concluída: ${data} registros removidos`);
                return data;
            } catch (error) {
                console.error('Erro na limpeza:', error);
                return 0;
            }
        }
        
        async function carregarPerfil() {
            await aguardarSupabase();
            
            const storedUser = sessionStorage.getItem('perfil_usuario');
            if (storedUser) {
                try {
                    const userData = JSON.parse(storedUser);
                    usuario = userData;
                    creditos = userData.creditos || 0;
                    console.log('✅ Dados carregados do sessionStorage:', usuario.email);
                    
                    // Carregar status PRO
                    const proStatus = await carregarStatusPro(usuario.uid);
                    isPro = proStatus.isPro;
                    usuario.isPro = isPro;
                    usuario.proExpiresAt = proStatus.expiresAt;
                    
                    sessionStorage.removeItem('perfil_usuario');
                    await carregarDadosCompletos();
                    return;
                } catch(e) { console.error('Erro:', e); }
            }
            
            const auth = firebase.auth();
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    console.log('✅ Usuário autenticado:', user.email);
                    usuario = { 
                        uid: user.uid, 
                        nome: user.displayName || user.email?.split('@')[0] || 'Usuário', 
                        email: user.email, 
                        foto: user.photoURL 
                    };
                    
                    // Carregar status PRO
                    const proStatus = await carregarStatusPro(usuario.uid);
                    isPro = proStatus.isPro;
                    usuario.isPro = isPro;
                    usuario.proExpiresAt = proStatus.expiresAt;
                    
                    await carregarCreditosDoBanco();
                    
                    // Limpar dados antigos do usuário (10 ou 30 dias)
                    await limparDadosAntigosUsuario(usuario.uid);
                    
                    await carregarDadosCompletos();
                } else {
                    document.getElementById('perfilContent').innerHTML = `
                        <div class="empty-message">
                            <h3>🔐 Você não está logado!</h3>
                            <p>Faça login no sistema para acessar seu perfil.</p>
                            <button class="btn-voltar" style="margin-top:15px;" onclick="window.location.href='index.html'">Ir para o sistema</button>
                        </div>
                    `;
                }
            });
        }
        
        async function carregarCreditosDoBanco() {
            if (!window.supabaseClient || !usuario) return;
            try {
                const { data, error } = await window.supabaseClient
                    .from('usuarios')
                    .select('creditos')
                    .eq('uid', usuario.uid)
                    .maybeSingle();
                if (error) throw error;
                if (data) creditos = data.creditos;
            } catch(e) { console.error('Erro créditos:', e); }
        }
        
        async function carregarDadosCompletos() {
            if (!window.supabaseClient || !usuario) {
                document.getElementById('perfilContent').innerHTML = `<div class="empty-message"><h3>⚠️ Erro de conexão</h3><button class="btn-voltar" onclick="window.location.href='index.html'">Voltar</button></div>`;
                return;
            }
            
            console.log('📡 Buscando dados para:', usuario.uid);
            
            const { data: historico, error: histError } = await window.supabaseClient
                .from('historico_palpites')
                .select('*')
                .eq('usuario_uid', usuario.uid)
                .order('data', { ascending: false })
                .limit(50);
            
            if (histError) console.error('Erro histórico:', histError);
            
            const { data: transacoes, error: transError } = await window.supabaseClient
                .from('transacoes')
                .select('*')
                .eq('usuario_uid', usuario.uid)
                .order('data', { ascending: false })
                .limit(30);
            
            if (transError) console.error('Erro transações:', transError);
            
            renderizarPerfil(historico || [], transacoes || []);
        }
        
        function renderizarPerfil(historico, transacoes) {
            const avatarHtml = usuario.foto 
                ? `<img src="${usuario.foto}" alt="Avatar" onerror="this.parentElement.innerHTML='👤'">`
                : '👤';
            
            let historicoHtml = '';
            let totalJogosIndividuais = 0;
            
            if (historico.length === 0) {
                historicoHtml = '<div class="empty-message">Nenhum palpite gerado ainda. Gere alguns no sistema!</div>';
            } else {
                historicoHtml = `<div class="scroll-area">`;
                
                historico.forEach((item, itemIdx) => {
                    const jogosArray = item.jogos || [];
                    const dataJogo = item.data ? new Date(item.data).toLocaleString() : 'Data desconhecida';
                    
                    jogosArray.forEach((jogo, jogoIdx) => {
                        totalJogosIndividuais++;
                        const numerosDisplay = Array.isArray(jogo) ? jogo.join(', ') : jogo;
                        
                        // CONFIGURAÇÕES: Mostra normal se for PRO, senão oculta
                        let configDisplay = '';
                        if (item.filtros) {
                            if (isPro) {
                                configDisplay = `<div class="config-texto" style="font-size: 10px; color: #666; margin-top: 6px; padding-top: 4px; border-top: 1px solid #eee;">⚙️ ${item.filtros}</div>`;
                            } else {
                                // Oculta as configurações para não PRO
                                const configMascarada = mascararConfiguracoes(item.filtros);
                                configDisplay = `<div class="config-texto" style="font-size: 10px; color: #999; margin-top: 6px; padding-top: 4px; border-top: 1px solid #eee;">⚙️ ${configMascarada}</div>`;
                            }
                        }
                        
                        // Mês da Sorte
                        let mesDisplay = '';
                        if (item.loteria === 'diadesorte' && item.meses && item.meses[jogoIdx]) {
                            const mesNome = getNomeMes(item.meses[jogoIdx]);
                            mesDisplay = `<br>📅 Mês da Sorte: ${mesNome} (${formatarNumeroZero(item.meses[jogoIdx])})`;
                        }
                        
                        historicoHtml += `
                            <div class="historico-item">
                                <div class="historico-header">
                                    <span class="historico-loteria">${item.loteria || 'Loteria'} - Jogo ${jogoIdx + 1}</span>
                                    <span class="historico-data">${dataJogo}</span>
                                </div>
                                <div class="historico-jogos">
                                    Números: ${numerosDisplay}${mesDisplay}
                                </div>
                                ${configDisplay}
                                <div style="margin-top: 8px;">
                                    <label class="checkbox-label">
                                        <input type="checkbox" class="selecionar-jogo" data-idx="${itemIdx}" data-jogo="${jogoIdx}" onchange="toggleSelecao(${itemIdx}, ${jogoIdx})">
                                        Selecionar para PDF
                                    </label>
                                </div>
                            </div>
                        `;
                    });
                });
                
                historicoHtml += `</div>`;
            }
            
            let transacoesHtml = '';
            if (transacoes.length === 0) {
                transacoesHtml = '<div class="empty-message">Nenhuma transação registrada</div>';
            } else {
                transacoesHtml = `
                    <div class="scroll-area">
                        <table class="transacoes-table">
                            <thead><tr><th>Data</th><th>Tipo</th><th>Valor</th><th>Saldo</th></tr></thead>
                            <tbody>
                                ${transacoes.map(t => `
                                    <tr>
                                        <td>${t.data ? new Date(t.data).toLocaleDateString() : '-'}</td>
                                        <td>${t.tipo === 'compra' ? 'Compra' : t.tipo === 'uso' ? 'Jogos' : t.tipo === 'pix_simulado' ? 'Teste' : t.tipo || '-'}</td>
                                        <td class="${t.tipo === 'uso' ? 'debito' : 'credito'}">${t.tipo === 'uso' ? `- R$ ${t.quantidade || 0}` : `+ R$ ${t.quantidade || 0}`}</td>
                                        <td>R$ ${t.saldo_apos || 0}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }
            
            const totalCompras = transacoes.filter(t => t.tipo === 'compra' || t.tipo === 'pix_simulado').length;
            
            // Badge PRO no perfil
            const proBadgeHtml = isPro 
                ? `<span class="pro-badge-pequeno" style="background: linear-gradient(135deg, #f59e0b, #eab308); margin-left: 10px;">⭐ PRO</span>`
                : `<span class="pro-badge-pequeno" style="background: #64748b; margin-left: 10px;">🔓 Grátis</span>`;
            
            // Botão de exportar PDF (com estilo diferente se não for PRO)
            const btnPdfHtml = isPro
                ? `<button class="btn-exportar-pdf" onclick="exportarSelecionadosPDF()" style="background: #22c55e;">📄 Exportar PDF</button>`
                : `<button class="btn-exportar-pdf btn-pdf-bloqueado" onclick="mostrarToast('⭐ Funcionalidade exclusiva PRO! Ative o plano PRO para exportar PDF.', 'warning')" style="background: #64748b; cursor: not-allowed;">🔒 Exportar PDF (PRO)</button>`;
            
            const html = `
                <div class="profile-grid">
                    <div class="card card-full">
                        <div class="perfil-header">
                            <div class="avatar">${avatarHtml}</div>
                            <div class="info">
                                <h2>${usuario.nome || 'Usuário'} ${proBadgeHtml}</h2>
                                ${isPro && usuario.proExpiresAt ? `<p style="font-size: 11px; color: #f59e0b;">✨ Válido até ${new Date(usuario.proExpiresAt).toLocaleDateString()}</p>` : ''}
                                <p>${usuario.email || 'Email não disponível'}</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="card">
