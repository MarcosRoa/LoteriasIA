<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Loterias IA</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    
    <!-- Supabase SDK - Carregado primeiro -->
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
        window.supabaseClient = createClient(
            'https://fuiaikymhsjdgdhojjhq.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1aWFpa3ltaHNqZGdkaG9qamhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwODI1NTEsImV4cCI6MjA5MzY1ODU1MX0.X9Qa1eJ6ut-QdKEZdjX2Ttm2STgJqOkEdNyohDpH3bk'
        );
        window.supabaseReady = true;
        console.log('✅ Supabase perfil conectado');
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: #ffffff; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .btn-voltar { background: #64748b; color: white; border: none; padding: 10px 25px; border-radius: 30px; cursor: pointer; font-weight: 600; margin-bottom: 20px; transition: transform 0.2s; }
        .btn-voltar:hover { transform: scale(1.02); background: #475569; }
        .perfil-card { background: #1e293b; border-radius: 20px; padding: 30px; margin-bottom: 30px; border: 2px solid #334155; }
        .perfil-header { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #8b5cf6, #06b6d4); display: flex; align-items: center; justify-content: center; font-size: 40px; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .info h2 { font-size: 24px; margin-bottom: 5px; }
        .info p { color: #94a3b8; word-break: break-all; }
        .saldo-card { background: linear-gradient(135deg, #f59e0b, #eab308); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 30px; }
        .saldo-card span { font-size: 14px; opacity: 0.9; }
        .saldo-card strong { font-size: 48px; display: block; color: #1e293b; }
        .section-title { font-size: 20px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #334155; }
        .historico-item { background: #0f172a; border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 4px solid #38bdf8; }
        .historico-header { display: flex; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; }
        .historico-loteria { font-weight: 600; color: #38bdf8; }
        .historico-data { font-size: 12px; color: #94a3b8; }
        .historico-jogos { font-size: 13px; color: #cbd5e1; word-break: break-all; }
        .transacoes-table { width: 100%; border-collapse: collapse; }
        .transacoes-table th, .transacoes-table td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        .transacoes-table th { color: #94a3b8; font-weight: 500; }
        .credito { color: #22c55e; }
        .debito { color: #ef4444; }
        .empty-message { text-align: center; padding: 40px; color: #94a3b8; }
        .loading { text-align: center; padding: 40px; color: #f59e0b; }
        @media (max-width: 768px) {
            .perfil-header { flex-direction: column; text-align: center; }
            .transacoes-table { font-size: 12px; }
            .transacoes-table th, .transacoes-table td { padding: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn-voltar" onclick="window.location.href='index.html'">← Voltar ao Sistema</button>
        <div id="perfilContent"><div class="loading">🔍 Carregando seus dados...</div></div>
    </div>

    <script>
        let usuario = null;
        let creditos = 0;
        
        // Função para aguardar o Supabase ficar pronto
        function aguardarSupabase() {
            return new Promise((resolve) => {
                if (window.supabaseClient) {
                    resolve();
                    return;
                }
                const checkInterval = setInterval(() => {
                    if (window.supabaseClient) {
                        clearInterval(checkInterval);
                        resolve();
                    }
                }, 100);
                // Timeout de 5 segundos
                setTimeout(() => {
                    clearInterval(checkInterval);
                    resolve();
                }, 5000);
            });
        }
        
        // ============================================
        // FUNÇÃO PRINCIPAL - CARREGA DADOS DO PERFIL
        // ============================================
        async function carregarPerfil() {
            // Aguarda Supabase ficar pronto
            await aguardarSupabase();
            
            // Tenta pegar dados do sessionStorage (vindo do index.html)
            const storedUser = sessionStorage.getItem('perfil_usuario');
            if (storedUser) {
                try {
                    const userData = JSON.parse(storedUser);
                    usuario = userData;
                    creditos = userData.creditos || 0;
                    console.log('✅ Dados carregados do sessionStorage:', usuario.email);
                    sessionStorage.removeItem('perfil_usuario');
                    await carregarDadosCompletos();
                    return;
                } catch(e) { console.error('Erro ao parsear sessionStorage:', e); }
            }
            
            // Se não veio do sessionStorage, verificar Firebase auth
            const auth = firebase.auth();
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    console.log('✅ Usuário autenticado pelo Firebase:', user.email);
                    usuario = { 
                        uid: user.uid, 
                        nome: user.displayName || user.email?.split('@')[0] || 'Usuário', 
                        email: user.email, 
                        foto: user.photoURL 
                    };
                    await carregarCreditosDoBanco();
                    await carregarDadosCompletos();
                } else {
                    console.log('❌ Usuário NÃO autenticado');
                    document.getElementById('perfilContent').innerHTML = `
                        <div class="empty-message">
                            <h3>🔐 Você não está logado!</h3>
                            <p>Faça login no sistema para acessar seu perfil.</p>
                            <button class="btn-voltar" style="margin-top:20px;" onclick="window.location.href='index.html'">Ir para o sistema</button>
                        </div>
                    `;
                }
            });
        }
        
        // ============================================
        // CARREGA CRÉDITOS DO SUPABASE
        // ============================================
        async function carregarCreditosDoBanco() {
            if (!window.supabaseClient || !usuario) {
                console.log('⚠️ Supabase não disponível ainda');
                return;
            }
            try {
                const { data, error } = await window.supabaseClient
                    .from('usuarios')
                    .select('creditos')
                    .eq('uid', usuario.uid)
                    .maybeSingle();
                
                if (error) throw error;
                if (data) {
                    creditos = data.creditos;
                    console.log('✅ Créditos carregados:', creditos);
                } else {
                    console.log('⚠️ Usuário não encontrado na tabela usuarios');
                }
            } catch(e) { 
                console.error('Erro ao carregar créditos:', e); 
            }
        }
        
        // ============================================
        // CARREGA HISTÓRICO E TRANSAÇÕES
        // ============================================
        async function carregarDadosCompletos() {
            if (!window.supabaseClient || !usuario) {
                console.log('❌ Supabase não disponível para carregar dados');
                document.getElementById('perfilContent').innerHTML = `
                    <div class="empty-message">
                        <h3>⚠️ Erro de conexão</h3>
                        <p>Não foi possível conectar ao banco de dados.</p>
                        <button class="btn-voltar" style="margin-top:20px;" onclick="window.location.href='index.html'">Voltar ao sistema</button>
                    </div>
                `;
                return;
            }
            
            console.log('📡 Buscando dados para:', usuario.uid);
            
            // Buscar histórico de palpites
            const { data: historico, error: histError } = await window.supabaseClient
                .from('historico_palpites')
                .select('*')
                .eq('usuario_uid', usuario.uid)
                .order('created_at', { ascending: false })
                .limit(50);
            
            if (histError) console.error('Erro histórico:', histError);
            console.log(`📜 Histórico: ${historico?.length || 0} registros`);
            
            // Buscar transações
            const { data: transacoes, error: transError } = await window.supabaseClient
                .from('transacoes')
                .select('*')
                .eq('usuario_uid', usuario.uid)
                .order('data', { ascending: false })
                .limit(30);
            
            if (transError) console.error('Erro transações:', transError);
            console.log(`💰 Transações: ${transacoes?.length || 0} registros`);
            
            renderizarPerfil(historico || [], transacoes || []);
        }
        
        // ============================================
        // RENDERIZA O PERFIL NA TELA
        // ============================================
        function renderizarPerfil(historico, transacoes) {
            // Avatar com foto ou ícone
            const avatarHtml = usuario.foto 
                ? `<img src="${usuario.foto}" alt="Avatar" onerror="this.style.display='none'; this.parentElement.innerHTML='👤'">`
                : '👤';
            
            // Histórico de palpites
            let historicoHtml = '';
            if (historico.length === 0) {
                historicoHtml = '<div class="empty-message">Nenhum palpite gerado ainda</div>';
            } else {
                historicoHtml = historico.map(item => `
                    <div class="historico-item">
                        <div class="historico-header">
                            <span class="historico-loteria">🎲 ${item.loteria || 'Loteria'}</span>
                            <span class="historico-data">${item.created_at ? new Date(item.created_at).toLocaleString() : 'Data desconhecida'}</span>
                        </div>
                        <div class="historico-jogos">
                            <strong>Jogos:</strong> ${item.jogos?.map(j => Array.isArray(j) ? `[${j.join(', ')}]` : j).join(', ') || 'Nenhum'}
                            ${item.extras ? `<br><strong>Extras:</strong> ${item.extras}` : ''}
                        </div>
                        <div style="font-size:11px;color:#94a3b8;margin-top:8px;">🔧 ${item.filtros || 'Sem filtros'}</div>
                    </div>
                `).join('');
            }
            
            // Transações
            let transacoesHtml = '';
            if (transacoes.length === 0) {
                transacoesHtml = '<div class="empty-message">Nenhuma transação registrada</div>';
            } else {
                transacoesHtml = `
                    <table class="transacoes-table">
                        <thead>
                            <tr><th>Data</th><th>Tipo</th><th>Valor</th><th>Saldo após</th></tr>
                        </thead>
                        <tbody>
                            ${transacoes.map(t => `
                                <tr>
                                    <td>${t.data ? new Date(t.data).toLocaleDateString() : 'Data desconhecida'}</td>
                                    <td>${t.tipo === 'compra' ? '💳 Compra' : t.tipo === 'uso' ? '🎲 Jogos' : t.tipo === 'pix_simulado' ? '🧪 PIX Teste' : t.tipo || 'Desconhecido'}</td>
                                    <td class="${t.tipo === 'uso' ? 'debito' : 'credito'}">${t.tipo === 'uso' ? `- R$ ${t.quantidade || 0}` : `+ R$ ${t.quantidade || 0}`}</td>
                                    <td>R$ ${t.saldo_apos || 0}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }
            
            const html = `
                <div class="perfil-card">
                    <div class="perfil-header">
                        <div class="avatar">${avatarHtml}</div>
                        <div class="info">
                            <h2>${usuario.nome || 'Usuário'}</h2>
                            <p>${usuario.email || 'Email não disponível'}</p>
                        </div>
                    </div>
                </div>
                
                <div class="saldo-card">
                    <span>💰 SALDO ATUAL</span>
                    <strong>R$ ${creditos}</strong>
                </div>
                
                <div class="perfil-card">
                    <h3 class="section-title">📜 Histórico de Palpites</h3>
                    ${historicoHtml}
                </div>
                
                <div class="perfil-card">
                    <h3 class="section-title">💰 Histórico de Transações</h3>
                    ${transacoesHtml}
                </div>
            `;
            
            document.getElementById('perfilContent').innerHTML = html;
        }
        
        // ============================================
        // INICIALIZAÇÃO DO FIREBASE
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyCA_FoID7Ch8LkcwK5TbQSK23lU7BxQMuE",
            authDomain: "loteriasia.firebaseapp.com",
            projectId: "loteriasia",
            storageBucket: "loteriasia.firebasestorage.app",
            messagingSenderId: "124650527048",
            appId: "1:124650527048:web:bc335922cb9e1586c3fb7d"
        };
        firebase.initializeApp(firebaseConfig);
        
        // INICIAR
        carregarPerfil();
    </script>
</body>
</html>
