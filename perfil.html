    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #020617;
            --bg-card: #1e293b;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border: #334155;
            --radius: 10px;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--bg-secondary), #0f2744);
            padding: 15px 20px;
            text-align: center;
            border-bottom: 2px solid var(--border);
        }
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1400px;
            margin: 0 auto;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header-logo img { width: 120px; height: auto; border-radius: 8px; }
        .header-text { flex: 1; text-align: center; }
        .header h1 { font-size: 20px; background: linear-gradient(135deg, #8b5cf6, #06b6d4, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .version-badge { display: inline-block; background: linear-gradient(135deg, #ef4444, #f59e0b); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-left: 8px; color: white; }
        .header-subtitle { color: var(--text-secondary); font-size: 11px; }

        .container { max-width: 1400px; margin: 0 auto; padding: 15px; }
        .btn-voltar { 
            background: #64748b; 
            color: white; 
            border: none; 
            padding: 8px 20px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 13px;
            margin-bottom: 15px; 
        }
        .btn-voltar:hover { transform: scale(1.02); background: #475569; }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .card {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid var(--border);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }
        .card:hover { transform: translateY(-2px); }
        
        .card-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .card-full { grid-column: span 2; }

        .perfil-header {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .avatar { 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            background: linear-gradient(135deg, #8b5cf6, #06b6d4); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 28px; 
            overflow: hidden; 
        }
        .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .info h2 { font-size: 18px; margin-bottom: 3px; }
        .info p { font-size: 11px; color: var(--text-secondary); word-break: break-all; }
        
        .saldo-card { 
            background: linear-gradient(135deg, #f59e0b, #eab308); 
            border-radius: 12px; 
            padding: 15px; 
            text-align: center; 
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .saldo-card strong { font-size: 28px; display: block; color: #1e293b; }
        .saldo-card span { font-size: 11px; opacity: 0.9; }
        
        .stats-container { 
            text-align: center; 
            padding: 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .stats-number { font-size: 28px; color: #38bdf8; font-weight: 700; }
        .stats-label { font-size: 11px; color: var(--text-secondary); }
        .stats-divider { margin: 10px 0; border-color: var(--border); }
        
        .scroll-area { 
            max-height: 350px; 
            overflow-y: auto; 
            padding-right: 5px;
        }
        .historico-item { 
            background: var(--bg-primary); 
            border-radius: 8px; 
            padding: 10px; 
            margin-bottom: 8px; 
            border-left: 3px solid #38bdf8;
            transition: all 0.2s;
        }
        .historico-item:hover { transform: translateX(3px); }
        .historico-header { display: flex; justify-content: space-between; margin-bottom: 6px; flex-wrap: wrap; }
        .historico-loteria { font-size: 12px; font-weight: 600; color: #38bdf8; }
        .historico-data { font-size: 10px; color: var(--text-secondary); }
        .historico-jogos { font-size: 12px; color: #cbd5e1; word-break: break-all; margin-top: 6px; line-height: 1.5; }
        
        .transacoes-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .transacoes-table th, .transacoes-table td { padding: 8px 4px; text-align: left; border-bottom: 1px solid var(--border); }
        .transacoes-table th { color: var(--text-secondary); font-weight: 500; }
        .credito { color: #22c55e; font-weight: 600; }
        .debito { color: #ef4444; font-weight: 600; }
        
        .empty-message { text-align: center; padding: 30px; color: var(--text-secondary); font-size: 12px; }
        .loading { text-align: center; padding: 20px; color: #f59e0b; font-size: 14px; }
        
        .btn-selecionar-todos, .btn-exportar-pdf {
            transition: all 0.2s;
            font-size: 11px;
            padding: 5px 12px;
            border-radius: 15px;
            cursor: pointer;
            border: none;
        }
        .btn-selecionar-todos { background: #38bdf8; color: white; }
        .btn-exportar-pdf { background: #22c55e; color: white; }
        .btn-selecionar-todos:hover, .btn-exportar-pdf:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        @media (max-width: 768px) {
            .profile-grid { grid-template-columns: 1fr; }
            .card-full { grid-column: span 1; }
            .perfil-header { flex-direction: column; text-align: center; }
            .header-logo img { width: 80px; }
            .header h1 { font-size: 16px; }
            .card-title { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>

        }
        
        function getNomeMes(numero) {
            const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 
                           'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
            return meses[numero - 1] || 'Desconhecido';
        }
        
        function toggleSelecao(itemIdx, jogoIdx) {
            const id = `${itemIdx}_${jogoIdx}`;
            if (jogosSelecionados.has(id)) {
                jogosSelecionados.delete(id);
            } else {
                jogosSelecionados.add(id);
            }
            atualizarContadorSelecionados();
        }
        
        function selecionarTodos() {
            const checkboxes = document.querySelectorAll('.selecionar-jogo');
            checkboxes.forEach(cb => {
                cb.checked = true;
                const id = `${cb.dataset.idx}_${cb.dataset.jogo}`;
                jogosSelecionados.add(id);
            });
            atualizarContadorSelecionados();
            mostrarToast(`${checkboxes.length} palpites selecionados!`, 'success');
        }
        
        function atualizarContadorSelecionados() {
            const contador = document.getElementById('contadorSelecionados');
            if (contador) {
                contador.textContent = `${jogosSelecionados.size} selecionado(s)`;
            }
        }
        
        // ============================================
        // FUNÇÃO PDF PROFISSIONAL COM BRASÃO
        // ============================================
        async function exportarSelecionadosPDF() {
            if (exportandoPDF) {
                console.log('Exportação já em andamento...');
                return;
            }
            
            exportandoPDF = true;
            
            try {
                const checkboxes = document.querySelectorAll('.selecionar-jogo:checked');
                
                if (checkboxes.length === 0) {
                    alert('Nenhum palpite selecionado!');
                    exportandoPDF = false;
                    return;
                }
                
                // Criar elemento para o PDF
                const divPDF = document.createElement('div');
                divPDF.style.padding = '30px';
                divPDF.style.backgroundColor = 'white';
                divPDF.style.fontFamily = "'Times New Roman', Arial, sans-serif";
                divPDF.style.maxWidth = '100%';
                
                // Obter data atual formatada
                const dataAtual = new Date();
                const dataFormatada = dataAtual.toLocaleDateString('pt-BR') + ' às ' + dataAtual.toLocaleTimeString('pt-BR');
                
                // Construir HTML dos palpites
                let palpitesHTML = '';
                let contador = 0;
                
                checkboxes.forEach((checkbox) => {
                    const item = checkbox.closest('.historico-item');
                    if (item) {
                        contador++;
                        const loteriaElem = item.querySelector('.historico-loteria');
                        const numerosElem = item.querySelector('.historico-jogos');
                        const dataElem = item.querySelector('.historico-data');
                        
                        let numerosTexto = numerosElem ? numerosElem.innerText : '';
                        numerosTexto = numerosTexto.replace(/[📊🎲💰📜✨📅]/g, '').replace('Números:', '').replace('Numeros:', '').trim();
                        
                        let loteriaTexto = loteriaElem ? loteriaElem.innerText : 'Loteria';
                        loteriaTexto = loteriaTexto.replace(/[🎲]/g, '').replace('🎲', '').trim();
                        
                        let dataTexto = dataElem ? dataElem.innerText : '';
                        dataTexto = dataTexto.replace(/[📅]/g, '').trim();
                        
                        // Separar números
                        const numerosArray = numerosTexto.split(',').map(n => n.trim());
                        
                        palpitesHTML += `
                            <div style="margin-bottom: 20px; padding: 12px; border-left: 4px solid #8b5cf6; background: #f8fafc; border-radius: 8px; page-break-inside: avoid;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap;">
                                    <span style="font-weight: bold; font-size: 13px; color: #1e293b;">${contador}. ${loteriaTexto}</span>
                                    <span style="font-size: 9px; color: #94a3b8;">${dataTexto || 'Data não informada'}</span>
                                </div>
                                <div style="font-family: 'Arial', monospace; font-size: 12px; font-style: italic; color: #3b82f6; margin-top: 6px;">
                                    Números: ${numerosArray.map(n => `<strong style="font-size: 13px;">${n}</strong>`).join(' • ')}
                                </div>
                            </div>
                        `;
                    }
                });
                
                // HTML completo do PDF
                divPDF.innerHTML = `
                    <div style="max-width: 100%; position: relative;">
                        <!-- MARCA D'ÁGUA -->
                        <div style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.04; z-index: 0; text-align: center; pointer-events: none;">
                            <img src="${BRASAO}" style="width: 350px; height: auto;">
                            <div style="font-size: 24px; font-weight: bold; color: #000; margin-top: 10px;">LOTERIAS IA</div>
                        </div>
                        
                        <div style="position: relative; z-index: 1;">
                            <!-- CABEÇALHO COM BRASÃO DOS DOIS LADOS -->
                            <div style="display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 25px; flex-wrap: wrap;">
                                <img src="${BRASAO}" style="width: 70px; height: 70px; object-fit: contain;">
                                <div style="text-align: center;">
                                    <h1 style="font-size: 28px; color: #8b5cf6; margin: 0; letter-spacing: 2px;">LOTERIAS IA</h1>
                                    <p style="font-size: 11px; color: #64748b; margin: 5px 0;">Sistema Profissional de Loterias com Inteligência Artificial</p>
                                    <p style="font-size: 10px; color: #94a3b8; margin: 0;">Versão 6.1</p>
                                </div>
                                <img src="${BRASAO}" style="width: 70px; height: 70px; object-fit: contain;">
                            </div>
                            
                            <!-- INFORMAÇÕES DO USUÁRIO -->
                            <div style="background: #f1f5f9; padding: 15px; border-radius: 10px; margin-bottom: 25px;">
                                <table style="width: 100%; font-size: 11px;">
                                    <tr><td style="padding: 4px;"><strong>👤 Usuário:</strong></td><td>${usuario.nome || 'Não informado'}</td>
                                    <td style="padding: 4px;"><strong>📧 Email:</strong></td><td>${usuario.email || 'Não informado'}</td></tr>
                                    <tr><td style="padding: 4px;"><strong>📅 Data de emissão:</strong></td><td>${dataFormatada}</td>
                                    <td style="padding: 4px;"><strong>🎯 Total de palpites:</strong></td><td>${checkboxes.length}</td></tr>
                                </table>
                            </div>
                            
                            <!-- TÍTULO -->
                            <h3 style="color: #8b5cf6; font-size: 16px; margin-bottom: 15px;">📜 PALPITES SELECIONADOS</h3>
                            
                            <!-- LISTA DE PALPITES -->
                            ${palpitesHTML}
                            
                            <!-- RODAPÉ -->
                            <div style="text-align: center; margin-top: 40px; padding-top: 15px; border-top: 1px solid #e2e8f0; font-size: 8px; color: #94a3b8;">
                                <p>Documento gerado por Loterias IA - Todos os direitos reservados</p>
                                <p>Gerado em ${dataFormatada}</p>
                            </div>
                        </div>
                    </div>
                `;
                
                // Adicionar ao corpo temporariamente
                document.body.appendChild(divPDF);
                divPDF.style.position = 'absolute';
                divPDF.style.left = '-9999px';
                divPDF.style.top = '-9999px';
                
                // Configurar opções do PDF
                const opt = {
                    margin: [0.3, 0.3, 0.3, 0.3],
                    filename: `palpites_loterias_ia_${Date.now()}.pdf`,
                    image: { type: 'jpeg', quality: 0.95 },
                    html2canvas: { scale: 2, useCORS: false, logging: false, letterRendering: true },
                    jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
                };
                
                // Gerar PDF automaticamente
                await html2pdf().set(opt).from(divPDF).save();
                
                // Remover elemento temporário
                document.body.removeChild(divPDF);
                
                mostrarToast(`${checkboxes.length} palpites exportados com sucesso!`, 'success');
                
            } catch (error) {
                console.error('Erro na exportação:', error);
                alert('Erro ao gerar PDF: ' + error.message);
            } finally {
                exportandoPDF = false;
            }
        }
        
        function mostrarToast(mensagem, tipo = 'success') {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.right = '20px';
            toast.style.background = tipo === 'success' ? '#22c55e' : '#f59e0b';
            toast.style.color = 'white';
            toast.style.padding = '10px 20px';
            toast.style.borderRadius = '8px';
            toast.style.zIndex = '9999';
            toast.style.fontSize = '13px';
            toast.innerHTML = mensagem;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function aguardarSupabase() {
            return new Promise((resolve) => {
                if (window.supabaseClient) { resolve(); return; }
                const checkInterval = setInterval(() => {
                    if (window.supabaseClient) { clearInterval(checkInterval); resolve(); }
                }, 100);
                setTimeout(() => { clearInterval(checkInterval); resolve(); }, 5000);
            });
        }
        
        async function carregarPerfil() {
            await aguardarSupabase();
            
            const storedUser = sessionStorage.getItem('perfil_usuario');
            if (storedUser) {
                try {
                    const userData = JSON.parse(storedUser);
                    usuario = userData;
                    creditos = userData.creditos || 0;
                    console.log('✅ Dados carregados do sessionStorage:', usuario.email);
                    sessionStorage.removeItem('perfil_usuario');
                    await carregarDadosCompletos();
                    return;
                } catch(e) { console.error('Erro:', e); }
            }
            
            const auth = firebase.auth();
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    console.log('✅ Usuário autenticado:', user.email);
                    usuario = { 
                        uid: user.uid, 
                        nome: user.displayName || user.email?.split('@')[0] || 'Usuário', 
                        email: user.email, 
                        foto: user.photoURL 
                    };
                    await carregarCreditosDoBanco();
                    await carregarDadosCompletos();
                } else {
                    document.getElementById('perfilContent').innerHTML = `
                        <div class="empty-message">
                            <h3>🔐 Você não está logado!</h3>
                            <p>Faça login no sistema para acessar seu perfil.</p>
                            <button class="btn-voltar" style="margin-top:15px;" onclick="window.location.href='index.html'">Ir para o sistema</button>
                        </div>
                    `;
                }
            });
        }
        
        async function carregarCreditosDoBanco() {
            if (!window.supabaseClient || !usuario) return;
            try {
                const { data, error } = await window.supabaseClient
                    .from('usuarios')
                    .select('creditos')
                    .eq('uid', usuario.uid)
                    .maybeSingle();
                if (error) throw error;
                if (data) creditos = data.creditos;
            } catch(e) { console.error('Erro créditos:', e); }
        }
        
        async function carregarDadosCompletos() {
            if (!window.supabaseClient || !usuario) {
                document.getElementById('perfilContent').innerHTML = `<div class="empty-message"><h3>⚠️ Erro de conexão</h3><button class="btn-voltar" onclick="window.location.href='index.html'">Voltar</button></div>`;
                return;
            }
            
            console.log('📡 Buscando dados para:', usuario.uid);
            
            const { data: historico, error: histError } = await window.supabaseClient
                .from('historico_palpites')
                .select('*')
                .eq('usuario_uid', usuario.uid)
                .order('data', { ascending: false })
                .limit(50);
            
            if (histError) console.error('Erro histórico:', histError);
            console.log(`📜 Histórico: ${historico?.length || 0} registros`);
            
            const { data: transacoes, error: transError } = await window.supabaseClient
                .from('transacoes')
                .select('*')
                .eq('usuario_uid', usuario.uid)
                .order('data', { ascending: false })
                .limit(30);
            
            if (transError) console.error('Erro transações:', transError);
            console.log(`💰 Transações: ${transacoes?.length || 0} registros`);
            
            renderizarPerfil(historico || [], transacoes || []);
        }
        
        function renderizarPerfil(historico, transacoes) {
            const avatarHtml = usuario.foto 
                ? `<img src="${usuario.foto}" alt="Avatar" onerror="this.parentElement.innerHTML='👤'">`
                : '👤';
            
            let historicoHtml = '';
            let totalJogosIndividuais = 0;
            
            if (historico.length === 0) {
                historicoHtml = '<div class="empty-message">Nenhum palpite gerado ainda. Gere alguns no sistema!</div>';
            } else {
                historicoHtml = `<div class="scroll-area">`;
                
                historico.forEach((item, itemIdx) => {
                    const ehDiaDaSorte = item.loteria === 'diadesorte';
                    const temMeses = item.meses && Array.isArray(item.meses) && item.meses.length > 0;
                    const jogosArray = item.jogos || [];
                    const dataJogo = item.data ? new Date(item.data).toLocaleString() : 'Data desconhecida';
                    
                    jogosArray.forEach((jogo, jogoIdx) => {
                        totalJogosIndividuais++;
                        const mesNumero = temMeses ? item.meses[jogoIdx] : null;
                        const mesNome = mesNumero ? getNomeMes(mesNumero) : null;
                        const numerosDisplay = Array.isArray(jogo) ? jogo.join(', ') : jogo;
                        
                        historicoHtml += `
                            <div class="historico-item">
                                <div class="historico-header">
                                    <span class="historico-loteria">${item.loteria || 'Loteria'} - Jogo ${jogoIdx + 1}</span>
                                    <span class="historico-data">${dataJogo}</span>
                                </div>
                                <div class="historico-jogos">
                                    Números: ${numerosDisplay}
                                    ${ehDiaDaSorte && mesNome ? `<br>Mês da Sorte: ${mesNome} (${formatarNumeroZero(mesNumero)})` : ''}
                                    ${item.extras && !temMeses && !ehDiaDaSorte ? `<br>${item.extras}` : ''}
                                </div>
                                <div style="margin-top: 8px;">
                                    <label class="checkbox-label">
                                        <input type="checkbox" class="selecionar-jogo" data-idx="${itemIdx}" data-jogo="${jogoIdx}" onchange="toggleSelecao(${itemIdx}, ${jogoIdx})">
                                        Selecionar para PDF
                                    </label>
                                </div>
                            </div>
                        `;
                    });
                });
                
                historicoHtml += `</div>`;
            }
            
            let transacoesHtml = '';
            if (transacoes.length === 0) {
                transacoesHtml = '<div class="empty-message">Nenhuma transação registrada</div>';
            } else {
                transacoesHtml = `
                    <div class="scroll-area">
                        <table class="transacoes-table">
                            <thead>
                                <tr><th>Data</th><th>Tipo</th><th>Valor</th><th>Saldo</th></tr>
                            </thead>
                            <tbody>
                                ${transacoes.map(t => `
                                    <tr>
                                        <td>${t.data ? new Date(t.data).toLocaleDateString() : '-'}</td>
                                        <td>${t.tipo === 'compra' ? 'Compra' : t.tipo === 'uso' ? 'Jogos' : t.tipo === 'pix_simulado' ? 'Teste' : t.tipo || '-'}</td>
                                        <td class="${t.tipo === 'uso' ? 'debito' : 'credito'}">${t.tipo === 'uso' ? `- R$ ${t.quantidade || 0}` : `+ R$ ${t.quantidade || 0}`}</td>
                                        <td>R$ ${t.saldo_apos || 0}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }
            
            const totalCompras = transacoes.filter(t => t.tipo === 'compra' || t.tipo === 'pix_simulado').length;
            
            const html = `
                <div class="profile-grid">
                    <div class="card card-full">
                        <div class="perfil-header">
                            <div class="avatar">${avatarHtml}</div>
                            <div class="info">
                                <h2>${usuario.nome || 'Usuário'}</h2>
                                <p>${usuario.email || 'Email não disponível'}</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-title">SALDO</div>
                        <div class="saldo-card">
                            <strong>R$ ${creditos}</strong>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-title">ESTATÍSTICAS</div>
                        <div class="stats-container">
                            <div class="stats-number">${totalJogosIndividuais}</div>
                            <div class="stats-label">Palpites gerados</div>
                            <hr class="stats-divider">
                            <div class="stats-number" style="color: #f59e0b;">${totalCompras}</div>
                            <div class="stats-label">Compras realizadas</div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-title">
                            <span>PALPITES</span>
                            <div style="display: flex; gap: 8px; align-items: center;">
                                <span id="contadorSelecionados" style="font-size: 10px; color: var(--text-secondary);">0 selecionado(s)</span>
                                <button class="btn-selecionar-todos" onclick="selecionarTodos()">Selecionar Todos</button>
                                <button class="btn-exportar-pdf" onclick="exportarSelecionadosPDF()">Exportar PDF</button>
                            </div>
                        </div>
                        ${historicoHtml}
                    </div>
                    
                    <div class="card">
                        <div class="card-title">TRANSAÇÕES</div>
                        ${transacoesHtml}
                    </div>
                </div>
            `;
            
            document.getElementById('perfilContent').innerHTML = html;
            jogosSelecionados.clear();
            atualizarContadorSelecionados();
        }
        
        // Expor funções globalmente
        window.toggleSelecao = toggleSelecao;
        window.selecionarTodos = selecionarTodos;
        window.exportarSelecionadosPDF = exportarSelecionadosPDF;
        
        const firebaseConfig = {
            apiKey: "AIzaSyCA_FoID7Ch8LkcwK5TbQSK23lU7BxQMuE",
            authDomain: "loteriasia.firebaseapp.com",
            projectId: "loteriasia",
            storageBucket: "loteriasia.firebasestorage.app",
            messagingSenderId: "124650527048",
            appId: "1:124650527048:web:bc335922cb9e1586c3fb7d"
        };
        firebase.initializeApp(firebaseConfig);
        
        carregarPerfil();
    </script>
</body>
</html>
