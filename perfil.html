    <script>
        let usuario = null;
        let creditos = 0;
        let jogosSelecionados = new Set();
        
        function formatarNumeroZero(numero) {
            return numero.toString().padStart(2, '0');
        }
        
        function getNomeMes(numero) {
            const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 
                           'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
            return meses[numero - 1] || 'Desconhecido';
        }
        
        function toggleSelecao(itemIdx, jogoIdx) {
            const id = `${itemIdx}_${jogoIdx}`;
            if (jogosSelecionados.has(id)) {
                jogosSelecionados.delete(id);
            } else {
                jogosSelecionados.add(id);
            }
            atualizarContadorSelecionados();
        }
        
        function selecionarTodos() {
            const checkboxes = document.querySelectorAll('.selecionar-jogo');
            checkboxes.forEach(cb => cb.checked = true);
            atualizarContadorSelecionados();
            mostrarToast(`${checkboxes.length} palpites selecionados!`, 'success');
        }
        
        function atualizarContadorSelecionados() {
            const contador = document.getElementById('contadorSelecionados');
            if (contador) contador.textContent = `${jogosSelecionados.size} selecionado(s)`;
        }
        
        // ============================================
        // NOVA FUNÇÃO: ABRE JANELA COM HTML BONITO
        // ============================================
        function exportarSelecionadosPDF() {
            const checkboxes = document.querySelectorAll('.selecionar-jogo:checked');
            
            if (checkboxes.length === 0) {
                alert('Nenhum palpite selecionado!');
                return;
            }
            
            // Coletar dados
            const palpites = [];
            checkboxes.forEach((checkbox) => {
                const item = checkbox.closest('.historico-item');
                if (item) {
                    const loteriaElem = item.querySelector('.historico-loteria');
                    const numerosElem = item.querySelector('.historico-jogos');
                    const dataElem = item.querySelector('.historico-data');
                    
                    let numerosTexto = numerosElem ? numerosElem.innerText : '';
                    numerosTexto = numerosTexto.replace('Números:', '').trim();
                    
                    let loteriaTexto = loteriaElem ? loteriaElem.innerText : 'Loteria';
                    loteriaTexto = loteriaTexto.replace('🎲', '').trim();
                    
                    palpites.push({
                        loteria: loteriaTexto,
                        numeros: numerosTexto,
                        data: dataElem ? dataElem.innerText : ''
                    });
                }
            });
            
            // Abrir nova janela
            const win = window.open('', '_blank');
            if (!win) {
                alert('Pop-up bloqueado! Permita pop-ups para este site.');
                return;
            }
            
            const dataAtual = new Date();
            const dataFormatada = dataAtual.toLocaleDateString('pt-BR') + ' às ' + dataAtual.toLocaleTimeString('pt-BR');
            
            // Gerar HTML dos palpites
            let palpitesHTML = '';
            palpites.forEach((p, idx) => {
                const numerosArray = p.numeros.split(',').map(n => n.trim());
                palpitesHTML += `
                    <div style="margin-bottom: 20px; padding: 15px; border-left: 4px solid #8b5cf6; background: #f8fafc; border-radius: 8px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span style="font-weight: bold; font-size: 14px;">${idx+1}. ${p.loteria}</span>
                            <span style="font-size: 11px; color: #666;">${p.data || ''}</span>
                        </div>
                        <div style="font-family: Arial; font-size: 13px; color: #2563eb; margin-top: 5px;">
                            Números: ${numerosArray.map(n => `<strong style="font-size: 14px;">${n}</strong>`).join(' • ')}
                        </div>
                    </div>
                `;
            });
            
            // HTML completo da janela (com brasão via emoji e marca d'água)
            const htmlConteudo = `<!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <title>Visualizar Palpites - Loterias IA</title>
                <style>
                    * { margin: 0; padding: 0; box-sizing: border-box; }
                    body {
                        font-family: 'Times New Roman', Arial, sans-serif;
                        background: #f0f0f0;
                        padding: 30px;
                    }
                    .container {
                        max-width: 900px;
                        margin: 0 auto;
                        background: white;
                        border-radius: 10px;
                        box-shadow: 0 5px 20px rgba(0,0,0,0.2);
                        overflow: hidden;
                    }
                    .header-pdf {
                        background: linear-gradient(135deg, #1e293b, #0f172a);
                        padding: 20px;
                        text-align: center;
                    }
                    .logo-container {
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        gap: 20px;
                    }
                    .brasao {
                        font-size: 50px;
                    }
                    .titulo-central h1 {
                        font-size: 28px;
                        color: #8b5cf6;
                    }
                    .titulo-central p {
                        font-size: 12px;
                        color: #94a3b8;
                    }
                    .content {
                        padding: 30px;
                    }
                    .info-usuario {
                        background: #f1f5f9;
                        padding: 15px;
                        border-radius: 10px;
                        margin-bottom: 25px;
                    }
                    .info-usuario div {
                        display: flex;
                        justify-content: space-between;
                        flex-wrap: wrap;
                        gap: 10px;
                    }
                    .marca-dagua-fixa {
                        position: fixed;
                        bottom: 20px;
                        right: 20px;
                        opacity: 0.08;
                        font-size: 80px;
                        font-weight: bold;
                        color: #000;
                        pointer-events: none;
                        z-index: 999;
                    }
                    .btn-salvar {
                        background: #22c55e;
                        color: white;
                        border: none;
                        padding: 12px 30px;
                        border-radius: 30px;
                        font-size: 16px;
                        font-weight: bold;
                        cursor: pointer;
                        margin: 20px auto;
                        display: block;
                        transition: transform 0.2s;
                    }
                    .btn-salvar:hover {
                        transform: scale(1.02);
                        background: #16a34a;
                    }
                    .footer-pdf {
                        text-align: center;
                        padding: 15px;
                        background: #f8fafc;
                        font-size: 10px;
                        color: #94a3b8;
                        border-top: 1px solid #e2e8f0;
                    }
                    @media print {
                        body { background: white; padding: 0; }
                        .btn-salvar { display: none; }
                        .container { box-shadow: none; }
                        .marca-dagua-fixa { opacity: 0.05; }
                    }
                </style>
            </head>
            <body>
                <div class="marca-dagua-fixa">🎲 LOTERIAS IA 🎲</div>
                
                <div class="container">
                    <div class="header-pdf">
                        <div class="logo-container">
                            <div class="brasao">🎲</div>
                            <div class="titulo-central">
                                <h1>LOTERIAS IA</h1>
                                <p>Sistema Profissional de Loterias com Inteligência Artificial</p>
                                <p>Versão 6.1</p>
                            </div>
                            <div class="brasao">🎲</div>
                        </div>
                    </div>
                    
                    <div class="content">
                        <div class="info-usuario">
                            <div>
                                <span><strong>👤 Usuário:</strong> ${usuario.nome || 'Não informado'}</span>
                                <span><strong>📧 Email:</strong> ${usuario.email || 'Não informado'}</span>
                                <span><strong>📅 Data:</strong> ${dataFormatada}</span>
                                <span><strong>🎯 Total:</strong> ${palpites.length} palpites</span>
                            </div>
                        </div>
                        
                        <h3 style="color: #8b5cf6; margin-bottom: 15px;">📜 PALPITES SELECIONADOS</h3>
                        
                        ${palpitesHTML}
                    </div>
                    
                    <div class="footer-pdf">
                        <p>Documento gerado por Loterias IA - Todos os direitos reservados</p>
                        <p>Gerado em ${dataFormatada}</p>
                    </div>
                </div>
                
                <div style="text-align: center; margin-top: 20px;">
                    <button class="btn-salvar" onclick="window.print(); setTimeout(() => window.close(), 500);">💾 SALVAR COMO PDF</button>
                    <p style="font-size: 12px; color: #666; margin-top: 10px;">Clique no botão acima para salvar o PDF</p>
                </div>
                
                <script>
                    // Garantir que o botão funcione
                    document.querySelector('.btn-salvar').onclick = function() {
                        window.print();
                        setTimeout(() => window.close(), 1000);
                    };
                <\/script>
            </body>
            </html>`;
            
            win.document.write(htmlConteudo);
            win.document.close();
            
            mostrarToast('Janela aberta! Clique em "Salvar como PDF" para exportar.', 'success');
        }
        
        function mostrarToast(mensagem, tipo = 'success') {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.right = '20px';
            toast.style.background = tipo === 'success' ? '#22c55e' : '#f59e0b';
            toast.style.color = 'white';
            toast.style.padding = '10px 20px';
            toast.style.borderRadius = '8px';
            toast.style.zIndex = '9999';
            toast.style.fontSize = '13px';
            toast.innerHTML = mensagem;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function aguardarSupabase() {
            return new Promise((resolve) => {
                if (window.supabaseClient) { resolve(); return; }
                const checkInterval = setInterval(() => {
                    if (window.supabaseClient) { clearInterval(checkInterval); resolve(); }
                }, 100);
                setTimeout(() => { clearInterval(checkInterval); resolve(); }, 5000);
            });
        }
        
        async function carregarPerfil() {
            await aguardarSupabase();
            
            const storedUser = sessionStorage.getItem('perfil_usuario');
            if (storedUser) {
                try {
                    const userData = JSON.parse(storedUser);
                    usuario = userData;
                    creditos = userData.creditos || 0;
                    console.log('✅ Dados carregados do sessionStorage:', usuario.email);
                    sessionStorage.removeItem('perfil_usuario');
                    await carregarDadosCompletos();
                    return;
                } catch(e) { console.error('Erro:', e); }
            }
            
            const auth = firebase.auth();
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    usuario = { 
                        uid: user.uid, 
                        nome: user.displayName || user.email?.split('@')[0] || 'Usuário', 
                        email: user.email, 
                        foto: user.photoURL 
                    };
                    await carregarCreditosDoBanco();
                    await carregarDadosCompletos();
                } else {
                    document.getElementById('perfilContent').innerHTML = `
                        <div class="empty-message">
                            <h3>🔐 Você não está logado!</h3>
                            <p>Faça login no sistema para acessar seu perfil.</p>
                            <button class="btn-voltar" style="margin-top:15px;" onclick="window.location.href='index.html'">Ir para o sistema</button>
                        </div>
                    `;
                }
            });
        }
        
        async function carregarCreditosDoBanco() {
            if (!window.supabaseClient || !usuario) return;
            try {
                const { data, error } = await window.supabaseClient
                    .from('usuarios')
                    .select('creditos')
                    .eq('uid', usuario.uid)
                    .maybeSingle();
                if (error) throw error;
                if (data) creditos = data.creditos;
            } catch(e) { console.error('Erro créditos:', e); }
        }
        
        async function carregarDadosCompletos() {
            if (!window.supabaseClient || !usuario) {
                document.getElementById('perfilContent').innerHTML = `<div class="empty-message"><h3>⚠️ Erro de conexão</h3><button class="btn-voltar" onclick="window.location.href='index.html'">Voltar</button></div>`;
                return;
            }
            
            const { data: historico, error: histError } = await window.supabaseClient
                .from('historico_palpites')
                .select('*')
                .eq('usuario_uid', usuario.uid)
                .order('data', { ascending: false })
                .limit(50);
            
            if (histError) console.error('Erro histórico:', histError);
            
            const { data: transacoes, error: transError } = await window.supabaseClient
                .from('transacoes')
                .select('*')
                .eq('usuario_uid', usuario.uid)
                .order('data', { ascending: false })
                .limit(30);
            
            if (transError) console.error('Erro transações:', transError);
            
            renderizarPerfil(historico || [], transacoes || []);
        }
        
        function renderizarPerfil(historico, transacoes) {
            const avatarHtml = usuario.foto 
                ? `<img src="${usuario.foto}" alt="Avatar" onerror="this.parentElement.innerHTML='👤'">`
                : '👤';
            
            let historicoHtml = '';
            let totalJogosIndividuais = 0;
            
            if (historico.length === 0) {
                historicoHtml = '<div class="empty-message">Nenhum palpite gerado ainda. Gere alguns no sistema!</div>';
            } else {
                historicoHtml = `<div class="scroll-area">`;
                
                historico.forEach((item, itemIdx) => {
                    const jogosArray = item.jogos || [];
                    const dataJogo = item.data ? new Date(item.data).toLocaleString() : 'Data desconhecida';
                    
                    jogosArray.forEach((jogo, jogoIdx) => {
                        totalJogosIndividuais++;
                        const numerosDisplay = Array.isArray(jogo) ? jogo.join(', ') : jogo;
                        
                        historicoHtml += `
                            <div class="historico-item">
                                <div class="historico-header">
                                    <span class="historico-loteria">${item.loteria || 'Loteria'} - Jogo ${jogoIdx + 1}</span>
                                    <span class="historico-data">${dataJogo}</span>
                                </div>
                                <div class="historico-jogos">
                                    Números: ${numerosDisplay}
                                </div>
                                <div style="margin-top: 8px;">
                                    <label class="checkbox-label">
                                        <input type="checkbox" class="selecionar-jogo" data-idx="${itemIdx}" data-jogo="${jogoIdx}" onchange="toggleSelecao(${itemIdx}, ${jogoIdx})">
                                        Selecionar para PDF
                                    </label>
                                </div>
                            </div>
                        `;
                    });
                });
                
                historicoHtml += `</div>`;
            }
            
            let transacoesHtml = '';
            if (transacoes.length === 0) {
                transacoesHtml = '<div class="empty-message">Nenhuma transação registrada</div>';
            } else {
                transacoesHtml = `
                    <div class="scroll-area">
                        <table class="transacoes-table">
                            <thead><tr><th>Data</th><th>Tipo</th><th>Valor</th><th>Saldo</th></tr></thead>
                            <tbody>
                                ${transacoes.map(t => `
                                    <tr>
                                        <td>${t.data ? new Date(t.data).toLocaleDateString() : '-'}</td>
                                        <td>${t.tipo === 'compra' ? 'Compra' : t.tipo === 'uso' ? 'Jogos' : t.tipo === 'pix_simulado' ? 'Teste' : t.tipo || '-'}</td>
                                        <td class="${t.tipo === 'uso' ? 'debito' : 'credito'}">${t.tipo === 'uso' ? `- R$ ${t.quantidade || 0}` : `+ R$ ${t.quantidade || 0}`}</td>
                                        <td>R$ ${t.saldo_apos || 0}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }
            
            const totalCompras = transacoes.filter(t => t.tipo === 'compra' || t.tipo === 'pix_simulado').length;
            
            const html = `
                <div class="profile-grid">
                    <div class="card card-full">
                        <div class="perfil-header">

                            <div class="info">

                            </div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-title">SALDO</div>
                        <div class="saldo-card"><strong>R$ ${creditos}</strong></div>
                    </div>
                    
                    <div class="card">
                        <div class="card-title">ESTATÍSTICAS</div>
                        <div class="stats-container">
                            <div class="stats-number">${totalJogosIndividuais}</div>
                            <div class="stats-label">Palpites gerados</div>
                            <hr class="stats-divider">
                            <div class="stats-number" style="color: #f59e0b;">${totalCompras}</div>
                            <div class="stats-label">Compras realizadas</div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-title">
                            <span>PALPITES</span>
                            <div style="display: flex; gap: 8px; align-items: center;">
                                <span id="contadorSelecionados">0 selecionado(s)</span>
                                <button class="btn-selecionar-todos" onclick="selecionarTodos()">Selecionar Todos</button>
                                <button class="btn-exportar-pdf" onclick="exportarSelecionadosPDF()">Visualizar e Exportar PDF</button>
                            </div>
                        </div>
                        ${historicoHtml}
                    </div>
                    
                    <div class="card">
                        <div class="card-title">TRANSAÇÕES</div>
                        ${transacoesHtml}
                    </div>
                </div>
            `;
            
            document.getElementById('perfilContent').innerHTML = html;
            jogosSelecionados.clear();
            atualizarContadorSelecionados();
        }

        window.selecionarTodos = selecionarTodos;
