    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #020617;
            --bg-card: #1e293b;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border: #334155;
            --radius: 12px;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ============================================ */
        /* CABEÇALHO - IDÊNTICO AO INDEX */
        /* ============================================ */
        .header {
            background: linear-gradient(135deg, var(--bg-secondary), #0f2744);
            padding: 20px 20px;
            text-align: center;
            border-bottom: 2px solid var(--border);
        }
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1400px;
            margin: 0 auto;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header-logo img { width: 150px; height: auto; border-radius: 8px; }
        .header-text { flex: 1; text-align: center; }
        .header h1 { font-size: 24px; background: linear-gradient(135deg, #8b5cf6, #06b6d4, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .version-badge { display: inline-block; background: linear-gradient(135deg, #ef4444, #f59e0b); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-left: 10px; color: white; }
        .header-subtitle { color: var(--text-secondary); font-size: 13px; }

        /* ============================================ */
        /* CONTAINER E BOTÃO VOLTAR */
        /* ============================================ */
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .btn-voltar { 
            background: #64748b; 
            color: white; 
            border: none; 
            padding: 10px 25px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: 600; 
            margin-bottom: 20px; 
            transition: transform 0.2s; 
        }
        .btn-voltar:hover { transform: scale(1.02); background: #475569; }

        /* ============================================ */
        /* GRID DE CARDS - DIVIDIDO EM COLUNAS */
        /* ============================================ */
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 25px;
            border: 2px solid var(--border);
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-3px); }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* CARD DE PERFIL (ocupa 2 colunas) */
        .card-full {
            grid-column: span 2;
        }
        
        /* ============================================ */
        /* PERFIL DO USUÁRIO */
        /* ============================================ */
        .perfil-header {
            display: flex;
            align-items: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .avatar { 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            background: linear-gradient(135deg, #8b5cf6, #06b6d4); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 40px; 
            overflow: hidden; 
        }
        .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .info h2 { font-size: 24px; margin-bottom: 5px; }
        .info p { color: var(--text-secondary); word-break: break-all; }
        
        /* ============================================ */
        /* SALDO */
        /* ============================================ */
        .saldo-card { 
            background: linear-gradient(135deg, #f59e0b, #eab308); 
            border-radius: 20px; 
            padding: 25px; 
            text-align: center; 
        }
        .saldo-card span { font-size: 14px; opacity: 0.9; }
        .saldo-card strong { font-size: 42px; display: block; color: #1e293b; }
        
        /* ============================================ */
        /* HISTÓRICO DE PALPITES */
        /* ============================================ */
        .historico-item { 
            background: var(--bg-primary); 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 12px; 
            border-left: 4px solid #38bdf8; 
            transition: all 0.2s;
        }
        .historico-item:hover { transform: translateX(5px); }
        .historico-header { display: flex; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; }
        .historico-loteria { font-weight: 600; color: #38bdf8; }
        .historico-data { font-size: 11px; color: var(--text-secondary); }
        .historico-jogos { font-size: 13px; color: #cbd5e1; word-break: break-all; margin-top: 8px; }
        
        /* ============================================ */
        /* TRANSAÇÕES */
        /* ============================================ */
        .transacoes-table { width: 100%; border-collapse: collapse; }
        .transacoes-table th, .transacoes-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .transacoes-table th { color: var(--text-secondary); font-weight: 500; }
        .credito { color: #22c55e; font-weight: 600; }
        .debito { color: #ef4444; font-weight: 600; }
        
        /* ============================================ */
        /* MENSAGENS E UTILITÁRIOS */
        /* ============================================ */
        .empty-message { text-align: center; padding: 40px; color: var(--text-secondary); }
        .loading { text-align: center; padding: 40px; color: #f59e0b; }
        .scroll-area { max-height: 400px; overflow-y: auto; }
        
        /* ============================================ */
        /* RESPONSIVIDADE */
        /* ============================================ */
        @media (max-width: 768px) {
            .profile-grid { grid-template-columns: 1fr; }
            .card-full { grid-column: span 1; }
            .perfil-header { flex-direction: column; text-align: center; }
            .transacoes-table { font-size: 11px; }
            .transacoes-table th, .transacoes-table td { padding: 8px; }
            .header-logo img { width: 100px; }
            .header h1 { font-size: 18px; }
        }
    </style>
</head>
<body>
    <!-- ============================================ -->
    <!-- CABEÇALHO - IGUAL AO INDEX -->
    <!-- ============================================ -->
    <div class="header">
        <div class="header-content">
            <div class="header-logo"><img src="BrasãoRoa Imagem.png" onerror="this.style.display='none'" alt="Logo"></div>
            <div class="header-text">
                <h1>🧠 Loterias V.6.1 <span class="version-badge">MEU PERFIL</span></h1>
                <p class="header-subtitle">10 loterias • IA que Aprende Padrões • Login Social • Sistema de Créditos • PIX</p>
            </div>
            <div class="header-logo"><img src="BrasãoRoa Imagem.png" onerror="this.style.display='none'" alt="Logo"></div>
        </div>
    </div>

    <div class="container">
        <button class="btn-voltar" onclick="window.location.href='index.html'">← Voltar ao Sistema</button>
        <div id="perfilContent"><div class="loading">🔍 Carregando seus dados...</div></div>
    </div>

    <script>
        let usuario = null;
        let creditos = 0;
        
        function aguardarSupabase() {
            return new Promise((resolve) => {
                if (window.supabaseClient) { resolve(); return; }
                const checkInterval = setInterval(() => {
                    if (window.supabaseClient) { clearInterval(checkInterval); resolve(); }
                }, 100);
                setTimeout(() => { clearInterval(checkInterval); resolve(); }, 5000);
            });
        }
        
        async function carregarPerfil() {
            await aguardarSupabase();
            
            const storedUser = sessionStorage.getItem('perfil_usuario');
            if (storedUser) {
                try {
                    const userData = JSON.parse(storedUser);
                    usuario = userData;
                    creditos = userData.creditos || 0;
                    console.log('✅ Dados carregados do sessionStorage:', usuario.email);
                    sessionStorage.removeItem('perfil_usuario');
                    await carregarDadosCompletos();
                    return;
                } catch(e) { console.error('Erro:', e); }
            }
            
            const auth = firebase.auth();
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    console.log('✅ Usuário autenticado:', user.email);
                    usuario = { 
                        uid: user.uid, 
                        nome: user.displayName || user.email?.split('@')[0] || 'Usuário', 
                        email: user.email, 
                        foto: user.photoURL 
                    };
                    await carregarCreditosDoBanco();
                    await carregarDadosCompletos();
                } else {
                    document.getElementById('perfilContent').innerHTML = `
                        <div class="empty-message">
                            <h3>🔐 Você não está logado!</h3>
                            <p>Faça login no sistema para acessar seu perfil.</p>
                            <button class="btn-voltar" style="margin-top:20px;" onclick="window.location.href='index.html'">Ir para o sistema</button>
                        </div>
                    `;
                }
            });
        }
        
        async function carregarCreditosDoBanco() {
            if (!window.supabaseClient || !usuario) return;
            try {
                const { data, error } = await window.supabaseClient
                    .from('usuarios')
                    .select('creditos')
                    .eq('uid', usuario.uid)
                    .maybeSingle();
                if (error) throw error;
                if (data) creditos = data.creditos;
            } catch(e) { console.error('Erro créditos:', e); }
        }
        
        async function carregarDadosCompletos() {
    if (!window.supabaseClient || !usuario) {
        console.log('❌ Supabase não disponível');
        return;
    }
    
    console.log('📡 Buscando dados para:', usuario.uid);
    
    // Buscar histórico de palpites - USANDO 'data' não 'created_at'
    const { data: historico, error: histError } = await window.supabaseClient
        .from('historico_palpites')
        .select('*')
        .eq('usuario_uid', usuario.uid)
        .order('data', { ascending: false })  // ← CORRIGIDO
        .limit(50);
    
    if (histError) console.error('Erro histórico:', histError);
    console.log(`📜 Histórico: ${historico?.length || 0} registros`);
    
    // Buscar transações
    const { data: transacoes, error: transError } = await window.supabaseClient
        .from('transacoes')
        .select('*')
        .eq('usuario_uid', usuario.uid)
        .order('data', { ascending: false })
        .limit(30);
    
    if (transError) console.error('Erro transações:', transError);
    console.log(`💰 Transações: ${transacoes?.length || 0} registros`);
    
    renderizarPerfil(historico || [], transacoes || []);
}
        
       function renderizarPerfil(historico, transacoes) {
    const avatarHtml = usuario.foto 
        ? `<img src="${usuario.foto}" alt="Avatar" onerror="this.parentElement.innerHTML='👤'">`
        : '👤';
    
    // Formatar histórico de palpites
    let historicoHtml = '';
    if (historico.length === 0) {
        historicoHtml = '<div class="empty-message">Nenhum palpite gerado ainda. Gere alguns no sistema!</div>';
    } else {
        historicoHtml = `<div class="scroll-area">${historico.map(item => `
            <div class="historico-item">
                <div class="historico-header">
                    <span class="historico-loteria">🎲 ${item.loteria || 'Loteria'}</span>
                    <span class="historico-data">${item.data ? new Date(item.data).toLocaleString() : 'Data desconhecida'}</span>
                </div>
                <div class="historico-jogos">
                    📊 ${item.jogos?.map(j => Array.isArray(j) ? `[${j.join(', ')}]` : j).join(', ') || 'Nenhum'}
                    ${item.extras ? `<br>✨ ${item.extras}` : ''}
                </div>
            </div>
        `).join('')}</div>`;
    }
    
    // Formatar transações
    let transacoesHtml = '';
    if (transacoes.length === 0) {
        transacoesHtml = '<div class="empty-message">Nenhuma transação registrada</div>';
    } else {
        transacoesHtml = `
            <div class="scroll-area">
                <table class="transacoes-table">
                    <thead><tr><th>Data</th><th>Tipo</th><th>Valor</th><th>Saldo</th></tr></thead>
                    <tbody>
                        ${transacoes.map(t => `
                            <tr>
                                <td>${t.data ? new Date(t.data).toLocaleDateString() : '-'}</td>
                                <td>${t.tipo === 'compra' ? '💳 Compra' : t.tipo === 'uso' ? '🎲 Jogos' : t.tipo === 'pix_simulado' ? '🧪 PIX Teste' : t.tipo || '-'}</td>
                                <td class="${t.tipo === 'uso' ? 'debito' : 'credito'}">${t.tipo === 'uso' ? `- R$ ${t.quantidade || 0}` : `+ R$ ${t.quantidade || 0}`}</td>
                                <td>R$ ${t.saldo_apos || 0}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }
    
    const html = `
        <div class="profile-grid">
            <div class="card card-full">
                <div class="perfil-header">
                    <div class="avatar">${avatarHtml}</div>
                    <div class="info">
                        <h2>${usuario.nome || 'Usuário'}</h2>
                        <p>${usuario.email || 'Email não disponível'}</p>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">💰 SALDO ATUAL</div>
                <div class="saldo-card"><strong>R$ ${creditos}</strong></div>
            </div>
            
            <div class="card">
                <div class="card-title">📊 ESTATÍSTICAS</div>
                <div style="text-align: center; padding: 10px;">
                    <div style="font-size: 28px; color: #38bdf8; font-weight: 700;">${historico.length}</div>
                    <div style="font-size: 11px; color: var(--text-secondary);">Palpites gerados</div>
                    <hr style="margin: 10px 0; border-color: var(--border);">
                    <div style="font-size: 28px; color: #f59e0b; font-weight: 700;">${transacoes.filter(t => t.tipo === 'compra' || t.tipo === 'pix_simulado').length}</div>
                    <div style="font-size: 11px; color: var(--text-secondary);">Compras realizadas</div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">📜 HISTÓRICO DE PALPITES</div>
                ${historicoHtml}
            </div>
            
            <div class="card">
                <div class="card-title">💰 TRANSAÇÕES</div>
                ${transacoesHtml}
            </div>
        </div>
    `;
    
    document.getElementById('perfilContent').innerHTML = html;
}
        
        
        const firebaseConfig = {
            apiKey: "AIzaSyCA_FoID7Ch8LkcwK5TbQSK23lU7BxQMuE",
            authDomain: "loteriasia.firebaseapp.com",
            projectId: "loteriasia",
            storageBucket: "loteriasia.firebasestorage.app",
            messagingSenderId: "124650527048",
            appId: "1:124650527048:web:bc335922cb9e1586c3fb7d"
        };
        firebase.initializeApp(firebaseConfig);
        
        carregarPerfil();
    </script>
</body>
